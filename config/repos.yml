# Registry of repos managed by the agent pipeline.
# The orchestrator reads this for per-repo overrides.

defaults:
  max_issues_per_run: 3
  max_revision_rounds: 1
  auto_merge:
    enabled: true          # set false for report-only mode (recommended first week)
    max_changed_lines: 200
    max_changed_files: 5
    blocked_paths:         # changes here always block auto-merge
      - ".github/**"
      - "**/auth/**"
      - "**/migrations/**"
      - "package.json"
      - "package-lock.json"
      - "requirements*.txt"
      - "Dockerfile"
      - "*.tf"
  soak_hours: 24
  stale_staging_days: 7

repos:
  # - name: YOUR-USERNAME/your-first-repo
  #   auto_merge:
  #     enabled: false     # start every new repo in report-only mode
