# EXAMPLE — copy to config/local/board.yml (git-ignored) and fill in.
# The local copy is the real registry; it never enters version control, so
# private repo names stay off public forks of this platform.

project:
  owner: "@me"           # user login or org; @me = the authenticated user
  number: 1              # github.com/users/<you>/projects/<number>

label: null              # only sync issues with this label; null = all open

repos:
  - your-user/your-repo
  - your-org/another-repo
