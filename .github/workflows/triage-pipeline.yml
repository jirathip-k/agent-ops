# Reusable triage pipeline workflow.
# Managed repos call this via workflow_call (see stubs/managed-repo-triage.yml).
# Can also be run directly against this repo for testing via workflow_dispatch.

name: Agent Triage Pipeline

on:
  workflow_call:
    inputs:
      target_repo:
        description: "owner/repo to operate on"
        required: true
        type: string
      max_issues:
        description: "Max issues to process per run"
        required: false
        type: number
        default: 3
      auto_merge:
        description: "Allow auto-merge to staging (false = report-only)"
        required: false
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      target_repo:
        description: "owner/repo to operate on"
        required: true
        type: string
      auto_merge:
        description: "Allow auto-merge to staging (false = report-only)"
        required: false
        type: boolean
        default: false

jobs:
  triage:
    runs-on: ubuntu-latest
    # One pipeline run per target at a time — prevents overlapping hourly
    # runs from grabbing the same issues. Job-level because workflow-level
    # concurrency breaks startup when invoked via workflow_call.
    concurrency:
      group: agent-triage-${{ inputs.target_repo }}
      cancel-in-progress: false
    timeout-minutes: 55 # must finish before the next hourly tick
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write  # claude-code-action exchanges an OIDC token
    steps:
      # Idle guard: skip the (token-costing) Claude session entirely when the
      # repo has no issue the orchestrator would act on. Runs in seconds, free.
      - name: Check for actionable work
        id: precheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list --repo "${{ inputs.target_repo }}" --state open --limit 100 \
            --json labels --jq '[.[] | select(
              ([.labels[].name] | map(. == "triage:done" or . == "needs-human"
                or . == "blocked" or . == "backlog") | any) | not
            )] | length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Actionable issues: $COUNT"

      - name: Checkout control repo (for prompts)
        if: steps.precheck.outputs.count != '0'
        uses: actions/checkout@v7
        with:
          # explicit: inside a reusable workflow the default is the CALLER's
          # repo, which would put the managed repo here instead of the prompts
          repository: jirathip-k/agent-ops
          path: agent-ops

      - name: Checkout target repo
        if: steps.precheck.outputs.count != '0'
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: target
          fetch-depth: 0

      - name: Run orchestrator
        if: steps.precheck.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # base/workhorse model (orchestrator + implementer/tester subagents);
          # the orchestrator prompt requests fable for planner/reviewer subagents
          #
          # --allowedTools is required: headless runs have nobody to approve
          # permission prompts, so any tool not listed here is silently denied
          # (a run without it burns tokens and produces zero side effects).
          # Bash is limited to the CLIs the pipeline actually needs — gh/git
          # for state, the package/test runners for gates. Repos with other
          # toolchains need their runner added here.
          claude_args: >-
            --model claude-sonnet-5
            --allowedTools "Bash(gh:*),Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(pnpm:*),Bash(yarn:*),Bash(uv:*),Bash(python:*),Bash(pytest:*),Read,Grep,Glob,Edit,Write,Task,TodoWrite"
          prompt: |
            TARGET_REPO: ${{ inputs.target_repo }}
            MAX_ISSUES: ${{ inputs.max_issues }}
            AUTO_MERGE: ${{ inputs.auto_merge }}
            Working directory for the target repo: ./target
            Agent role files: ./agent-ops/prompts/agents/

            Follow the orchestrator instructions in
            ./agent-ops/prompts/orchestrator.md exactly.
