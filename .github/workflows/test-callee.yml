# Temporary: minimal reusable workflow for startup_failure bisection.
name: Test Callee

on:
  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
      max_issues:
        required: false
        type: number
        default: 3
      auto_merge:
        required: false
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: agent-triage-${{ inputs.target_repo }}
      cancel-in-progress: false
    steps:
      - run: echo "target=${{ inputs.target_repo }} max=${{ inputs.max_issues }} am=${{ inputs.auto_merge }}"
